name: Ingest — poll devices

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: netguard
          POSTGRES_PASSWORD: netguard
          POSTGRES_DB: netguard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest pipeline
        env:
          DATABASE_URL: postgresql://netguard:netguard@localhost/netguard
          DEVICE_USERNAME: ${{ secrets.DEVICE_USERNAME }}
          DEVICE_PASSWORD: ${{ secrets.DEVICE_PASSWORD }}
        run: python -m pipeline.etl.extractor

      - name: Upload ingest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingest-log-${{ github.run_number }}
          path: logs/ingest_*.log
          retention-days: 7
