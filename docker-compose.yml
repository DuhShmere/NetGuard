version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://netguard:netguard@db/netguard
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  celery:
    build: .
    command: celery -A backend.tasks.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql://netguard:netguard@db/netguard
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: netguard
      POSTGRES_PASSWORD: netguard
      POSTGRES_DB: netguard
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_data:
