<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NetGuard — Compliance Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
    header { background: #0C447C; color: white; padding: 1rem 2rem; }
    header h1 { font-size: 1.4rem; font-weight: 600; }
    header p  { font-size: 0.85rem; opacity: 0.8; margin-top: 2px; }
    #score-bar { display: flex; gap: 1rem; padding: 1.25rem 2rem; background: white; border-bottom: 1px solid #e0e0e0; }
    .score-card { background: #f0f7ff; border: 1px solid #b5d4f4; border-radius: 8px; padding: 0.75rem 1.25rem; min-width: 120px; }
    .score-card .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
    .score-card .value { font-size: 28px; font-weight: 600; color: #0C447C; }
    #status { padding: 8px 2rem; font-size: 12px; color: #666; background: #fffbe6; border-bottom: 1px solid #f0e08a; }
    table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
    th { text-align: left; padding: 10px 1rem; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #555; border-bottom: 2px solid #e0e0e0; }
    td { padding: 10px 1rem; font-size: 13px; border-bottom: 1px solid #eee; }
    tr:hover td { background: #f9f9f9; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
    .high   { background: #fde8e8; color: #a32d2d; }
    .medium { background: #faeeda; color: #633806; }
    .ok     { background: #eaf3de; color: #27500A; }
    main { padding: 0 2rem 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>NetGuard</h1>
    <p>Network Compliance and Drift Detection</p>
  </header>
  <div id="score-bar">
    <div class="score-card"><div class="label">Fleet score</div><div class="value" id="fleet-score">--</div></div>
    <div class="score-card"><div class="label">Devices</div><div class="value" id="device-count">--</div></div>
    <div class="score-card"><div class="label">Violations</div><div class="value" id="violation-count">--</div></div>
  </div>
  <div id="status">Connecting to live feed...</div>
  <main>
    <table>
      <thead>
        <tr><th>Hostname</th><th>Vendor</th><th>IP</th><th>Score</th><th>Violations</th><th>Last checked</th></tr>
      </thead>
      <tbody id="device-table"><tr><td colspan="6" style="color:#999;text-align:center;padding:2rem">Loading...</td></tr></tbody>
    </table>
  </main>
  <script src="websocket_client.js"></script>
</body>
</html>
